name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.10'
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || github.token }}
          USER_NAME: ${{ secrets.USER_NAME || github.repository_owner }}
        run: uv run generate.py
      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "viktorserhiienko2022@gmail.com"
          git config --global user.name "andyparfei/GitHub-Actions-Bot"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
